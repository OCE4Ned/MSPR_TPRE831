name: mecha
 
networks:
  app:
    driver: bridge
  data:
    driver: bridge
 
volumes:
  postgres_data:
 
services:
 
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [app]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${REGISTRY}/mecha/backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      IA_API_URL: http://api_ia:8000
      LOG_LEVEL: info
    ports:
      - "127.0.0.1:5006:8000"
    networks: [app]
    depends_on:
      postgres:
        condition: service_healthy
 
  api_ia:
    image: ${REGISTRY}/mecha/api_ia:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
      MODEL_NAME: ${MODEL_NAME}
      MODEL_STAGE: ${MODEL_STAGE:-Production}
      MLFLOW_TRACKING_USERNAME: ${MLFLOW_TRACKING_USERNAME}
      MLFLOW_TRACKING_PASSWORD: ${MLFLOW_TRACKING_PASSWORD}
    ports:
      - "127.0.0.1:5007:8000"
    networks: [app]
    depends_on:
      postgres:
        condition: service_healthy
 
  frontend:
    image: ${REGISTRY}/mecha/frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      API_BASE_URL: ${PUBLIC_API_BASE_URL}
    ports:
      - "127.0.0.1:5005:3000"
    networks: [app]
    depends_on:
      - backend