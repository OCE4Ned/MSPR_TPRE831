global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: node
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: backend
    metrics_path: /metrics
    static_configs:
      - targets: ['backend:8000']

  - job_name: api-ia
    metrics_path: /metrics
    static_configs:
      - targets: ['api-ia:8000']

  - job_name: jenkins
    metrics_path: /prometheus
    static_configs:
      - targets: ['host.docker.internal:8080']