services:
  postgres:
    image: postgres:16
    container_name: mspr-postgres
    environment:
      POSTGRES_USER: mspr
      POSTGRES_PASSWORD: mspr
      POSTGRES_DB: industrial_dw
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-postgres.sql:/docker-entrypoint-initdb.d/01-init-postgres.sql:ro
      - ../pipeline/docker/init-postgres.sql:/docker-entrypoint-initdb.d/02-industrial-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mspr -d industrial_dw"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: mspr-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

  kafka:
    image: apache/kafka:3.7.1
    container_name: mspr-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka-producer:
    build:
      context: ../pipeline
      dockerfile: docker/Dockerfile.pipeline
    container_name: mspr-kafka-producer
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: industrial.raw
      SOURCE_DIRS: /app/data/raw,/app/data/processed/business
      SOURCE_GLOB: "*.csv"
    volumes:
      - ../data:/app/data
    depends_on:
      kafka:
        condition: service_healthy
    command: ["python", "pipeline/kafka_producer.py"]
    profiles: ["ingestion"]

  kafka-machine-simulator:
    build:
      context: ../pipeline
      dockerfile: docker/Dockerfile.pipeline
    container_name: mspr-kafka-machine-simulator
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: industrial.raw
      MACHINE_MAPPING_PATH: /app/data/processed/business/machine_mapping.csv
      PARTS_PATH: /app/data/processed/business/parts.csv
      SEND_INTERVAL_SECONDS: 2
      MAX_EVENTS: 0
    volumes:
      - ../data:/app/data
    depends_on:
      kafka:
        condition: service_healthy
    command: ["python", "pipeline/machine_stream_simulator.py"]
    profiles: ["streaming"]

  kafka-datalake-consumer:
    build:
      context: ../pipeline
      dockerfile: docker/Dockerfile.pipeline
    container_name: mspr-kafka-datalake-consumer
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: industrial.raw
      KAFKA_GROUP_ID: datalake-writer
      DATALAKE_RAW_DIR: /app/data/datalake/raw
      MAX_IDLE_SECONDS: 20
    volumes:
      - ../data:/app/data
    depends_on:
      kafka:
        condition: service_healthy
    command: ["python", "pipeline/kafka_to_datalake.py"]
    profiles: ["ingestion"]

  airflow-init:
    build:
      context: ../pipeline
      dockerfile: docker/Dockerfile.airflow
    container_name: mspr-airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://mspr:mspr@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: mspr-airflow-shared-secret
      AIRFLOW_CONN_INDUSTRIAL_POSTGRES: postgres://mspr:mspr@postgres:5432/industrial_dw
      AIRFLOW_VAR_DATALAKE_RAW_DIR: /opt/airflow/data/datalake/raw
    volumes:
      - ../pipeline/airflow/dags:/opt/airflow/dags
      - ../data:/opt/airflow/data
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -c "airflow db migrate &&
      airflow users create --username admin --password admin --firstname Admin --lastname MSPR --role Admin --email admin@example.com || true"

  airflow-webserver:
    build:
      context: ../pipeline
      dockerfile: docker/Dockerfile.airflow
    container_name: mspr-airflow-webserver
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://mspr:mspr@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: mspr-airflow-shared-secret
      AIRFLOW_CONN_INDUSTRIAL_POSTGRES: postgres://mspr:mspr@postgres:5432/industrial_dw
      AIRFLOW_VAR_DATALAKE_RAW_DIR: /opt/airflow/data/datalake/raw
    volumes:
      - ../pipeline/airflow/dags:/opt/airflow/dags
      - ../data:/opt/airflow/data
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: ["airflow", "webserver"]

  airflow-scheduler:
    build:
      context: ../pipeline
      dockerfile: docker/Dockerfile.airflow
    container_name: mspr-airflow-scheduler
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://mspr:mspr@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: mspr-airflow-shared-secret
      AIRFLOW_CONN_INDUSTRIAL_POSTGRES: postgres://mspr:mspr@postgres:5432/industrial_dw
      AIRFLOW_VAR_DATALAKE_RAW_DIR: /opt/airflow/data/datalake/raw
    volumes:
      - ../pipeline/airflow/dags:/opt/airflow/dags
      - ../data:/opt/airflow/data
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: ["airflow", "scheduler"]

volumes:
  postgres_data:
  pgadmin_data:
