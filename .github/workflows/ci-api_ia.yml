name: CI API IA

on:
  pull_request:
    paths: ['api_ia/**']
  push:
    branches-ignore: ['ai-api/production']
    paths: ['api_ia/**']

concurrency:
  group: ci-api_ia-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api_ia
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: api_ia/requirements.txt
      - run: |
          pip install -r requirements.txt
          pip install ruff pytest pytest-cov httpx
      - run: ruff check .
      - run: ruff format --check .
      - run: pytest --cov=app
